---
# 1. Headless Service per la scoperta dei peer etcd
apiVersion: v1
kind: Service
metadata:
  name: etcd-headless
  labels:
    app: etcd
spec:
  clusterIP: None
  ports:
    - port: 2380
      name: peer
    - port: 2379
      name: client
  selector:
    app: etcd

---
# 2. Service standard per l'accesso client (dai tuoi pod Go)
apiVersion: v1
kind: Service
metadata:
  name: etcd-client
  labels:
    app: etcd
spec:
  ports:
    - port: 2379
      name: client
  selector:
    app: etcd

---
# 3. StatefulSet per il cluster etcd
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  labels:
    app: etcd
spec:
  serviceName: "etcd-headless"
  replicas: 3
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      # Anti-affinity per evitare che più pod etcd finiscano sullo stesso nodo fisico,
      # massimizzando la Partition Tolerance (P)
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - etcd
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.9
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /usr/local/bin/etcd
            - --name=$(POD_NAME)
            - --listen-peer-urls=http://0.0.0.0:2380
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://$(POD_NAME).etcd-headless.$(POD_NAMESPACE).svc.cluster.local:2379
            - --initial-advertise-peer-urls=http://$(POD_NAME).etcd-headless.$(POD_NAMESPACE).svc.cluster.local:2380
            # Poiché le repliche sono 3 e i nomi sono predicibili (etcd-0, etcd-1, etcd-2)
            - --initial-cluster=etcd-0=http://etcd-0.etcd-headless.$(POD_NAMESPACE).svc.cluster.local:2380,etcd-1=http://etcd-1.etcd-headless.$(POD_NAMESPACE).svc.cluster.local:2380,etcd-2=http://etcd-2.etcd-headless.$(POD_NAMESPACE).svc.cluster.local:2380
            - --initial-cluster-token=marafonet-etcd-cluster
            - --initial-cluster-state=new
            - --data-dir=/var/run/etcd/default.etcd
          ports:
            - containerPort: 2380
              name: peer
            - containerPort: 2379
              name: client
          volumeMounts:
            - name: etcd-data
              mountPath: /var/run/etcd
  # Storage persistente per la consistenza (C) in caso di crash dei pod
  volumeClaimTemplates:
    - metadata:
        name: etcd-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi