apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marafonet-ingress
spec:
  ingressClassName: nginx
  #tls:
  #- hosts:
  #  - localhost
  #  secretName: marafonet-tls-secret # TODO: set up secret inside cluster
  rules:
  - host: localhost
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: marafonet
            port:
              number: 5000