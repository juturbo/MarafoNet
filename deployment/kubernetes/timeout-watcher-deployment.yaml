apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeout-watcher
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: timeout-watcher
  template:
    metadata:
      labels:
        app: timeout-watcher
    spec:
      containers:
        - name: timeout-watcher
          image: ghcr.io/juturbo/mf-timeout-watcher:latest
          env:
            - name: ETCD_ENDPOINTS
              value: "etcd-client:2379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      terminationGracePeriodSeconds: 30
