name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'internal/**'
      - 'cmd/**'
      - 'model/**'
      - 'frontend/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
  # Uncomment to also trigger on pull requests for testing
  # pull_request:
  #   branches:
  #     - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-marafonet:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.7'

      - name: Tidy Go modules
        run: go mod tidy
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/juturbo/marafonet
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push marafonet image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/marafonet/Dockerfile
          push: true
          # tags: ${{ steps.meta.outputs.tags }}
          tags: ${{ env.REGISTRY }}/juturbo/marafonet:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-matchmaking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.7'

      - name: Tidy Go modules
        run: go mod tidy

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/juturbo/mf-matchmaking
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push matchmaking image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployment/matchmaking/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/juturbo/mf-matchmaking:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
