name: Build LaTeX Report

on:
  push:
    branches:
      - main
    paths:
      - 'report-src/**'
      - '.github/workflows/build-latex.yml'
  pull_request:
    paths:
      - 'report-src/**'
      - '.github/workflows/build-latex.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install dependencies
        run: |
          gem install bibtex-ruby

      - name: Generate bibliography
        working-directory: report-src
        run: |
          ruby bibtex_prettifier.rb

      - name: Compile LaTeX
        uses: DanySK/compile-and-publish-all-latex@2.2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: report-src

      - name: Update release with container images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          
          # Get existing body
          EXISTING_BODY=$(gh release view "$LATEST_RELEASE" --json body -q '.body')
          
          # Append container images
          NEW_BODY="
          What's new: $EXISTING_BODY

          ## Container Images
          Latest container images for this release:
          - **MarafoNet**: \`ghcr.io/juturbo/marafonet:latest\`
          - **Matchmaking**: \`ghcr.io/juturbo/mf-matchmaking:latest\`

          View in package registry: https://github.com/juturbo?tab=packages&repo_name=marafonet"
              
          gh release edit "$LATEST_RELEASE" -n "$NEW_BODY"

